name: PXVIRT ophub Armbian

on:
  workflow_dispatch:
    inputs:
      amlogic_soc:
        description: "ophub board name (e.g. s905x3, s922x)"
        type: string
        required: true
        default: "s922x"
      armbian_kernel:
        description: "Kernel version, stable=all defaults"
        type: choice
        required: true
        default: "stable"
        options:
          - stable
          - 6.12.y
          - 6.18.y
          - 6.6.y
          - 6.1.y
          - 5.15.y
      release:
        description: "Debian release (PBS requires trixie)"
        type: choice
        required: true
        default: "bookworm"
        options:
          - bookworm
          - trixie
      product:
        description: "Product type"
        type: choice
        required: true
        default: "pxvirt"
        options:
          - pxvirt
          - pbs
      hostname:
        description: "Hostname"
        type: string
        required: true
        default: "pxvirt"
      ip_address:
        description: "Static IP (IP/MASK,GATEWAY e.g. 192.168.1.100/24,192.168.1.1)"
        type: string
        required: true
      root_password:
        description: "Root password (empty=passwordless)"
        type: string
        required: false
        default: ""

jobs:
  build-base:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache /usr/local/share/boost
          sudo apt-get clean

      - name: Clone Armbian & prepare
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build
          bash .github/scripts/prepare-userpatches.sh armbian-build

      - name: Detect platform
        id: platform
        run: |
          CONF=".github/scripts/model_database.conf"
          FIRST_BOARD="${{ inputs.amlogic_soc }}"
          FIRST_BOARD="${FIRST_BOARD%%_*}"
          PLATFORM=$(awk -F':' -v board="$FIRST_BOARD" '$14 ~ "^"board"[[:space:]]*$" {gsub(/[[:space:]]/, "", $10); print $10; exit}' "$CONF")
          case "$PLATFORM" in
            rockchip)  BUILD_BOARD="rock-5b" ;;
            allwinner) BUILD_BOARD="orangepizero3" ;;
            *)         BUILD_BOARD="odroidn2" ;;
          esac
          echo "build_board=$BUILD_BOARD" >> $GITHUB_OUTPUT
          echo "Detected platform=$PLATFORM → BUILD_BOARD=$BUILD_BOARD"

      - name: Build Armbian base image
        env:
          PXVIRT_PRODUCT: ${{ inputs.product }}
          PXVIRT_CODENAME: ${{ inputs.release }}
          PXVIRT_HOSTNAME: ${{ inputs.hostname }}
          PXVIRT_IP: ${{ inputs.ip_address }}
          PXVIRT_ROOT_PASSWORD: ${{ inputs.root_password }}
        run: |
          cd armbian-build
          sudo -E ./compile.sh \
            BOARD=${{ steps.platform.outputs.build_board }} \
            BRANCH=current \
            RELEASE=${{ inputs.release }} \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            SHARE_LOG=yes

      - uses: actions/upload-artifact@v4
        with:
          name: armbian-base-image
          path: armbian-build/output/images/*.img*
          compression-level: 0

  repackage-tvbox:
    needs: build-base
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: armbian-base-image
          path: ./base-image

      - name: Prepare base image
        id: prep
        run: |
          cd base-image
          for f in *.xz; do [ -f "$f" ] && xz -d "$f"; done
          for f in *.zst; do [ -f "$f" ] && zstd -d "$f"; done
          img=$(ls *.img | head -1)
          echo "img_path=$(pwd)/${img}" >> $GITHUB_OUTPUT

      - name: Rebuild for TV Box
        uses: ophub/amlogic-s9xxx-armbian@main
        with:
          build_target: armbian
          armbian_path: ${{ steps.prep.outputs.img_path }}
          armbian_board: ${{ inputs.amlogic_soc }}
          armbian_kernel: ${{ inputs.armbian_kernel != 'stable' && inputs.armbian_kernel || '' }}
          auto_kernel: true
          kernel_repo: ophub/kernel
          kernel_usage: stable
          armbian_size: 6000

      - name: Rename images
        run: |
          cd ${{ env.PACKAGED_OUTPUTPATH }}
          for f in *.img.gz; do
            board=$(echo "$f" | sed -n 's/.*_\(s[0-9a-z]*\)_.*/\1/p')
            kernel=$(echo "$f" | sed -n 's/.*_k\([0-9.]*\)_.*/\1/p')
            mv "$f" "pxvirt-${board:-box}-${{ inputs.release }}-k${kernel:-unknown}.img.gz" 2>/dev/null || true
          done

      - uses: actions/upload-artifact@v4
        with:
          name: pxvirt-box-${{ inputs.amlogic_soc }}-${{ inputs.release }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
          retention-days: 14
          compression-level: 0

      - uses: geekyeggo/delete-artifact@v5
        with:
          name: armbian-base-image
